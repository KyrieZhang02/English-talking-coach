<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SpeakUp</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; background: #ffffff; color-scheme: light only; }
body {
  font-family: 'Outfit', sans-serif;
  background: #ffffff; color: #1a1a1a;
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  overflow: hidden; -webkit-text-size-adjust: 100%;
}
.key-screen {
  position: fixed; inset: 0; background: #fff;
  display: flex; align-items: center; justify-content: center;
  z-index: 500; padding: 24px;
}
.key-box { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 14px; }
.key-logo { font-size: 24px; font-weight: 600; }
.key-logo span { background: #1a1a1a; color: #fff; padding: 2px 8px; border-radius: 6px; margin-left: 4px; font-size: 20px; }
.key-sub { font-size: 14px; color: #888; line-height: 1.6; }
.key-input { width: 100%; padding: 13px 15px; border: 1.5px solid #ddd; border-radius: 12px; font-size: 14px; font-family: 'Outfit', sans-serif; color: #1a1a1a; outline: none; }
.key-input:focus { border-color: #1a1a1a; }
.key-link { font-size: 12px; color: #aaa; }
.key-link a { color: #1a1a1a; text-decoration: none; font-weight: 500; }
.key-err { font-size: 12px; color: #dc2626; display: none; }
.key-err.show { display: block; }
.key-btn { padding: 14px; border-radius: 12px; background: #1a1a1a; border: none; color: #fff; font-size: 15px; font-weight: 600; font-family: 'Outfit', sans-serif; cursor: pointer; touch-action: manipulation; }
.key-btn:active { background: #333; }

.topbar { padding: 12px 16px 4px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.logo { font-size: 17px; font-weight: 600; }
.logo span { background: #1a1a1a; color: #fff; padding: 1px 6px; border-radius: 5px; font-size: 14px; margin-left: 2px; }
.topright { display: flex; gap: 7px; align-items: center; }
.chip { font-size: 11px; font-weight: 500; padding: 3px 11px; border-radius: 20px; border: 1px solid #ddd; background: #fafafa; color: #666; cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.end-btn { font-size: 11px; font-weight: 500; padding: 5px 13px; border-radius: 20px; border: 1px solid #fcd34d; background: #fffbeb; color: #b45309; cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

.chat { flex: 1; overflow-y: auto; padding: 12px 16px 8px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
.msg { max-width: 82%; font-size: 15px; line-height: 1.65; padding: 11px 15px; border-radius: 18px; word-break: break-word; animation: pop 0.18s ease; }
@keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg.ai { background: #f2f2f2; color: #1a1a1a; align-self: flex-start; border-radius: 4px 18px 18px 18px; }
.msg.you { background: #1a1a1a; color: #fff; align-self: flex-end; border-radius: 18px 4px 18px 18px; }
.msg.correction { align-self: flex-start; background: #fff5f5; border: 1px solid #fca5a5; border-radius: 12px; font-size: 13px; color: #444; max-width: 85%; }
.corr-label { font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: #dc2626; margin-bottom: 4px; }
.corr-old { color: #dc2626; text-decoration: line-through; }
.corr-new { color: #16a34a; font-weight: 500; }
.corr-why { color: #666; font-size: 12px; margin-top: 3px; }

.typing { align-self: flex-start; background: #f2f2f2; border-radius: 4px 18px 18px 18px; padding: 12px 16px; display: flex; gap: 5px; align-items: center; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #aaa; animation: blink 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,60%,100% { opacity: 0.3; } 30% { opacity: 1; } }

.bottom { background: #fff; border-top: 1px solid #ececec; padding: 16px 16px max(20px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; gap: 10px; flex-shrink: 0; }
.transcript { font-size: 13px; color: #bbb; font-style: italic; text-align: center; min-height: 16px; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mic-outer { position: relative; width: 84px; height: 84px; display: flex; align-items: center; justify-content: center; }
.ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid rgba(26,26,26,0.15); pointer-events: none; }
.recording .ring.a { animation: ripple 1.3s ease-out infinite; }
.recording .ring.b { animation: ripple 1.3s ease-out 0.45s infinite; }
@keyframes ripple { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(1.9); opacity: 0; } }
.mic-btn { width: 70px; height: 70px; border-radius: 50%; background: #1a1a1a; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 24px rgba(0,0,0,0.2); transition: transform 0.1s, background 0.15s; position: relative; z-index: 1; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
.mic-btn:active { transform: scale(0.93); }
.mic-btn.rec { background: #dc2626; box-shadow: 0 6px 24px rgba(220,38,38,0.35); }
.status-text { font-size: 13px; color: #999; font-weight: 500; text-align: center; min-height: 18px; }
.status-text.listening { color: #dc2626; }
.status-text.thinking { color: #555; }

.overlay { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; justify-content: center; }
.overlay.on { display: flex; }
.sheet { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto; padding-bottom: max(16px, env(safe-area-inset-bottom)); animation: sheetUp 0.28s cubic-bezier(0.32,0.72,0,1); }
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-top { padding: 24px 20px 16px; text-align: center; border-bottom: 1px solid #eee; }
.sheet-emoji { font-size: 34px; display: block; margin-bottom: 8px; }
.sheet-title { font-size: 20px; font-weight: 600; margin-bottom: 5px; }
.sheet-sum { font-size: 13px; color: #666; line-height: 1.65; }
.scores { display: flex; border-bottom: 1px solid #eee; }
.sc { flex: 1; padding: 14px 8px; text-align: center; border-right: 1px solid #eee; }
.sc:last-child { border-right: none; }
.sc-n { font-size: 26px; font-weight: 600; margin-bottom: 3px; }
.sc-l { font-size: 10px; color: #aaa; }
.sheet-body { padding: 16px 20px 8px; display: flex; flex-direction: column; gap: 14px; }
.sec-title { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #bbb; margin-bottom: 6px; }
.fb { display: flex; gap: 8px; font-size: 13px; line-height: 1.6; color: #555; padding: 8px 11px; background: #f8f8f8; border-radius: 9px; margin-bottom: 4px; }
.fbd { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
.sheet-btns { padding: 12px 20px 20px; display: flex; gap: 8px; }
.btn-p { flex: 1; padding: 12px; border-radius: 11px; background: #1a1a1a; border: none; color: #fff; font-size: 14px; font-weight: 500; font-family: 'Outfit', sans-serif; cursor: pointer; touch-action: manipulation; }
.btn-p:active { background: #333; }
.btn-s { padding: 12px 16px; border-radius: 11px; background: #f5f5f5; border: none; color: #555; font-size: 14px; font-family: 'Outfit', sans-serif; cursor: pointer; touch-action: manipulation; }
</style>
</head>
<body>

<div class="key-screen" id="key-screen">
  <div class="key-box">
    <div class="key-logo">SpeakUp <span>Grok</span></div>
    <div class="key-sub">输入你的 xAI API Key。Key 只保存在浏览器里。</div>
    <input class="key-input" id="key-input" type="password" placeholder="xai-..." />
    <div class="key-err" id="key-err">Key 应该以 xai- 开头，请检查后重试。</div>
    <div class="key-link">获取 Key → <a href="https://console.x.ai" target="_blank">console.x.ai</a></div>
    <button class="key-btn" onclick="startApp()">开始练习 →</button>
  </div>
</div>

<div class="topbar">
  <div class="logo">SpeakUp <span>Grok</span></div>
  <div class="topright">
    <div class="chip" id="chip-level" onclick="cycleLevel()">Intermediate</div>
    <div class="chip" id="chip-topic" onclick="cycleTopic()">Daily Life</div>
    <button class="end-btn" onclick="endSession()">Feedback</button>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="bottom">
  <div class="transcript" id="transcript"></div>
  <div class="mic-outer" id="mic-outer">
    <div class="ring a"></div>
    <div class="ring b"></div>
    <button class="mic-btn" id="mic-btn" ontouchstart="onMicTouch(event)" onclick="onMicClick()">
      <svg id="icon-mic" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
      <svg id="icon-stop" width="26" height="26" viewBox="0 0 24 24" fill="white" style="display:none">
        <rect x="6" y="6" width="12" height="12" rx="2"/>
      </svg>
    </button>
  </div>
  <div class="status-text" id="status">Tap to speak</div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-top">
      <span class="sheet-emoji">✨</span>
      <div class="sheet-title">Session Complete</div>
      <div class="sheet-sum" id="sheet-sum">Generating feedback…</div>
    </div>
    <div class="scores">
      <div class="sc"><div class="sc-n" id="sc-g" style="color:#16a34a">—</div><div class="sc-l">Grammar</div></div>
      <div class="sc"><div class="sc-n" id="sc-v" style="color:#555">—</div><div class="sc-l">Vocabulary</div></div>
      <div class="sc"><div class="sc-n" id="sc-f" style="color:#d97706">—</div><div class="sc-l">Fluency</div></div>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
    <div class="sheet-btns">
      <button class="btn-s" onclick="closeModal()">Close</button>
      <button class="btn-p" onclick="newSession()">New Session</button>
    </div>
  </div>
</div>

<script>
const TOPICS = ["Daily Life","Travel","Business","Food","Technology","Culture"];
const LEVELS = ["Beginner","Intermediate","Advanced"];
// grok-3-mini-fast = fastest, grok-3-mini = balanced, grok-3 = smartest
const MODEL = "grok-3-mini-fast";

let apiKey = '', history = [], topic = "Daily Life", level = "Intermediate";
let turns = 0, corrections = 0, busy = false;
let recognition = null, isRecording = false;
let synth = window.speechSynthesis;

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('xai_key');
  if (saved) { apiKey = saved; document.getElementById('key-screen').style.display = 'none'; init(); }
  if (synth) { synth.getVoices(); if ('onvoiceschanged' in synth) synth.onvoiceschanged = () => synth.getVoices(); }
});

function startApp() {
  const key = document.getElementById('key-input').value.trim();
  if (!key.startsWith('xai-')) { document.getElementById('key-err').classList.add('show'); return; }
  apiKey = key;
  localStorage.setItem('xai_key', key);
  document.getElementById('key-screen').style.display = 'none';
  init();
}

function cycleLevel() { level = LEVELS[(LEVELS.indexOf(level)+1)%LEVELS.length]; document.getElementById('chip-level').textContent = level; }
function cycleTopic() { topic = TOPICS[(TOPICS.indexOf(topic)+1)%TOPICS.length]; document.getElementById('chip-topic').textContent = topic; }

function setStatus(txt, cls) {
  const el = document.getElementById('status');
  el.textContent = txt;
  el.className = 'status-text' + (cls ? ' '+cls : '');
}

let touchHandled = false;
function onMicTouch(e) { e.preventDefault(); touchHandled = true; handleMic(); setTimeout(() => { touchHandled = false; }, 400); }
function onMicClick() { if (touchHandled) return; handleMic(); }
function handleMic() { if (busy) return; isRecording ? stopRec(true) : startRec(); }

function startRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Please use Chrome or Safari.'); return; }
  synth?.cancel();
  recognition = new SR();
  recognition.lang = 'en-US'; recognition.continuous = false; recognition.interimResults = true;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('rec');
    document.getElementById('mic-outer').classList.add('recording');
    document.getElementById('icon-mic').style.display = 'none';
    document.getElementById('icon-stop').style.display = 'block';
    setStatus('Listening…', 'listening');
    document.getElementById('transcript').textContent = '';
  };
  recognition.onresult = e => {
    const t = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('transcript').textContent = t;
    if (e.results[e.results.length-1].isFinal) { stopRec(false); sendToAI(t.trim()); }
  };
  recognition.onerror = () => stopRec(false);
  recognition.onend = () => { if (isRecording) stopRec(false); };
  try { recognition.start(); } catch(e) {}
}

function stopRec(manual) {
  try { recognition?.stop(); } catch(e) {}
  isRecording = false;
  document.getElementById('mic-btn').classList.remove('rec');
  document.getElementById('mic-outer').classList.remove('recording');
  document.getElementById('icon-mic').style.display = 'block';
  document.getElementById('icon-stop').style.display = 'none';
  if (manual) {
    const t = document.getElementById('transcript').textContent.trim();
    document.getElementById('transcript').textContent = '';
    if (t) sendToAI(t); else setStatus('Tap to speak');
  }
}

// ── Grok API — short system prompt for speed ──
function sysPrompt() {
  return `English speaking coach. Topic: ${topic}. Level: ${level}. Learner is Chinese.
Reply 1-2 sentences max. Correct max 1 error gently. End with a question.
Reply ONLY as JSON: {"reply":"...","hasCorrection":false,"correction":null,"scores":{"grammar":80,"vocab":75,"fluency":70}}
With correction: {"reply":"...","hasCorrection":true,"correction":{"original":"...","fixed":"...","why":"..."},"scores":{"grammar":80,"vocab":75,"fluency":70}}`;
}

function feedbackSys() {
  const msgs = history.filter(m=>m.role==='user').map(m=>m.content).join('\n');
  return `Rate this English practice. User: ${level}, Topic: ${topic}, Turns: ${turns}.\nSaid:\n${msgs}\nJSON only: {"grammar":80,"vocab":75,"fluency":70,"summary":"2 sentences","strengths":["...","..."],"improve":["..."],"next":["...","..."]}`;
}

async function callGrok(messages, system) {
  const r = await fetch("https://api.x.ai/v1/chat/completions", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 250,  // reduced for speed
      temperature: 0.7,
      messages: [{ role: "system", content: system }, ...messages]
    })
  });
  if (!r.ok) throw new Error('API error ' + r.status);
  const d = await r.json();
  return d.choices[0].message.content;
}

function parseJ(t) { try { return JSON.parse(t.replace(/```json|```/g,'').trim()); } catch { return null; } }

function speak(text) {
  if (!synth) return;
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = level === 'Beginner' ? 0.84 : level === 'Advanced' ? 1.05 : 0.95;
  const voices = synth.getVoices();
  const v = voices.find(v => v.name.includes('Samantha'))
         || voices.find(v => v.name.includes('Karen'))
         || voices.find(v => v.lang === 'en-US')
         || voices.find(v => v.lang.startsWith('en'));
  if (v) utt.voice = v;
  utt.onend = () => setStatus('Tap to speak');
  synth.speak(utt);
  setTimeout(() => setStatus('Tap to speak'), 8000);
}

function addMsg(cls, html) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls; el.innerHTML = html;
  document.getElementById('chat').appendChild(el);
  el.scrollIntoView({behavior:'smooth', block:'end'});
}
function addTyping() {
  const el = document.createElement('div');
  el.className = 'typing'; el.id = 'typing';
  el.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  document.getElementById('chat').appendChild(el);
  el.scrollIntoView({behavior:'smooth', block:'end'});
}
function removeTyping() { document.getElementById('typing')?.remove(); }

async function sendToAI(text) {
  if (!text || busy) return;
  busy = true; setStatus('Thinking…', 'thinking');
  document.getElementById('transcript').textContent = '';
  addMsg('you', text);
  history.push({role:'user', content:text});
  turns++; addTyping();
  try {
    const raw = await callGrok(history, sysPrompt());
    const p = parseJ(raw);
    removeTyping();
    if (p) {
      addMsg('ai', p.reply);
      history.push({role:'assistant', content:p.reply});
      if (p.hasCorrection && p.correction) {
        corrections++;
        const c = p.correction;
        const el = document.createElement('div');
        el.className = 'msg correction';
        el.innerHTML = `<div class="corr-label">💡 Correction</div><div class="corr-old">✗ ${c.original}</div><div class="corr-new">✓ ${c.fixed}</div><div class="corr-why">${c.why}</div>`;
        document.getElementById('chat').appendChild(el);
        el.scrollIntoView({behavior:'smooth', block:'end'});
      }
      setStatus('Speaking…', 'thinking');
      speak(p.reply);
    } else {
      addMsg('ai', "Could you try again?");
      setStatus('Tap to speak');
    }
  } catch(e) {
    removeTyping();
    addMsg('ai', "Connection issue — check your API key.");
    setStatus('Tap to speak');
  }
  busy = false;
}

async function init() {
  busy = true; setStatus('Loading…', 'thinking'); addTyping();
  try {
    const raw = await callGrok(
      [{role:'user', content:`Greet and ask 1 question about ${topic}. JSON: {"reply":"...","hasCorrection":false,"correction":null,"scores":null}`}],
      sysPrompt()
    );
    const p = parseJ(raw);
    removeTyping();
    const msg = p?.reply || `Hi! Let's practice English. What's on your mind?`;
    addMsg('ai', msg);
    if (p?.reply) history.push({role:'assistant', content:p.reply});
    setStatus('Speaking…', 'thinking');
    speak(msg);
  } catch(e) {
    removeTyping();
    addMsg('ai', "Check your API key and try again.");
    setStatus('Tap to speak');
  }
  busy = false;
}

async function endSession() {
  if (turns === 0) { alert('Have a conversation first 😊'); return; }
  synth?.cancel();
  document.getElementById('overlay').classList.add('on');
  document.getElementById('sheet-sum').textContent = 'Generating feedback…';
  document.getElementById('sheet-body').innerHTML = '';
  ['sc-g','sc-v','sc-f'].forEach(id => document.getElementById(id).textContent = '…');
  try {
    const raw = await callGrok([{role:'user', content:'Feedback.'}], feedbackSys());
    const fb = parseJ(raw);
    if (fb) {
      document.getElementById('sc-g').textContent = fb.grammar;
      document.getElementById('sc-v').textContent = fb.vocab;
      document.getElementById('sc-f').textContent = fb.fluency;
      document.getElementById('sheet-sum').textContent = fb.summary;
      const sec = (title, items, color) => {
        if (!items?.length) return '';
        return `<div><div class="sec-title">${title}</div>${items.map(s=>`<div class="fb"><div class="fbd" style="background:${color}"></div><div>${s}</div></div>`).join('')}</div>`;
      };
      document.getElementById('sheet-body').innerHTML =
        sec('✨ Strengths', fb.strengths, '#16a34a') +
        sec('🔧 To improve', fb.improve, '#d97706') +
        sec('🚀 Next steps', fb.next, '#1a1a1a');
    }
  } catch(e) {
    document.getElementById('sheet-sum').textContent = 'Could not load feedback. Try again.';
  }
}

function closeModal() { document.getElementById('overlay').classList.remove('on'); }

function newSession() {
  closeModal(); synth?.cancel();
  history = []; turns = 0; corrections = 0;
  document.getElementById('chat').innerHTML = '';
  init();
}
</script>
</body>
</html>
